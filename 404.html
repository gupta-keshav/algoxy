<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Algoxy AI</title>
  <link rel="icon" type="image/png" href="src/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: hsl(0, 0%, 0%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3 {
      font-family: 'Instrument Serif', serif;
    }

    /* ── Liquid Glass ─────────────────────────────────────────── */
    .liquid-glass {
      position: relative;
      background: rgba(255, 255, 255, 0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15);
      overflow: hidden;
      cursor: pointer;
      color: #fff;
      font-family: 'Inter', sans-serif;
      transition: scale 0.2s ease;
    }

    .liquid-glass:hover { scale: 1.03; }

    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.45) 0%,
        rgba(255, 255, 255, 0.15) 20%,
        rgba(255, 255, 255, 0)    40%,
        rgba(255, 255, 255, 0)    60%,
        rgba(255, 255, 255, 0.15) 80%,
        rgba(255, 255, 255, 0.45) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ── Animations ───────────────────────────────────────────── */
    @keyframes fade-rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-rise       { animation: fade-rise 0.8s ease-out 0.1s  both; }
    .animate-fade-rise-delay { animation: fade-rise 0.8s ease-out 0.35s both; }
    .animate-fade-rise-delay-2 { animation: fade-rise 0.8s ease-out 0.55s both; }

    /* ── Page ─────────────────────────────────────────────────── */
    .page {
      position: relative;
      height: 100vh;
      overflow: hidden;
      background: #000;
      display: flex;
      flex-direction: column;
    }

    /* ── Background image ─────────────────────────────────────── */
    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: blur(2px);
      transform: scale(1.04);
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 1;
    }

    /* ── Content ──────────────────────────────────────────────── */
    .page-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    /* ── Navbar ───────────────────────────────────────────────── */
    .navbar {
      flex-shrink: 0;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      max-width: 80rem;
      width: 100%;
      margin: 0 auto;
    }

    .navbar-brand {
      font-family: 'Instrument Serif', serif;
      font-size: 1.875rem;
      letter-spacing: -0.025em;
      color: #fff;
      text-decoration: none;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .navbar-logo {
      height: 2rem;
      width: auto;
      display: block;
    }

    .navbar-links {
      display: none;
      flex-direction: row;
      gap: 2.5rem;
      list-style: none;
      flex: 1;
      justify-content: center;
    }

    .navbar-links a {
      font-size: 0.875rem;
      color: #fff;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .navbar-links a:hover { opacity: 0.8; }

    .navbar-cta {
      border-radius: 9999px;
      padding: 0.625rem 1.5rem;
      font-size: 0.875rem;
    }

    @media (min-width: 768px) {
      .navbar-links { display: flex; }
    }

    /* ── Centered 404 content ─────────────────────────────────── */
    .error-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 2rem 4rem;
      gap: 1.5rem;
    }

    .error-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
    }

    .error-heading {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: #fff;
    }

    .error-sub {
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.875rem, 1.5vw, 1rem);
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.7;
      max-width: 28rem;
    }

    .error-cta {
      border-radius: 9999px;
      padding: 0.875rem 2.5rem;
      font-size: 0.9rem;
      text-decoration: none;
    }

    /* ── Mobile bottom nav ───────────────────────────────────── */
    .mobile-nav-bottom { display: none; }

    @media (max-width: 767px) {
      .page { height: auto; min-height: 100vh; overflow-y: auto; }
      .bg-video, .bg-overlay { position: fixed; }
      .navbar-cta { display: none; }
      .navbar     { justify-content: center; }

      .error-body {
        justify-content: center;
        padding: 1.5rem 1.25rem 3rem;
        gap: 1.75rem;
      }

      .mobile-nav-bottom {
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 1.5rem 2rem 2rem;
      }

      .mobile-nav-bottom a {
        font-family: 'Inter', sans-serif;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.75);
        text-decoration: underline;
        text-underline-offset: 5px;
        text-decoration-color: rgba(255, 255, 255, 0.35);
        transition: color 0.2s ease, text-decoration-color 0.2s ease;
      }

      .mobile-nav-bottom a:hover {
        color: #fff;
        text-decoration-color: rgba(255, 255, 255, 0.7);
      }

      .mobile-nav-bottom a.inactive { opacity: 0.3; pointer-events: none; }
    }

    @media (max-width: 640px) {
      .navbar       { padding: 1.25rem 1.25rem; }
      .navbar-brand { font-size: 1.35rem; }
      .navbar-logo  { height: 1.5rem; }
      .error-heading { font-size: clamp(2rem, 8vw, 2.75rem); }
      .error-sub    { font-size: 0.95rem; }
    }

    /* ── Site footer ──────────────────────────────────────────── */
    .site-footer {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2rem;
      max-width: 80rem;
      width: 100%;
      margin: 0 auto;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      flex-shrink: 0;
    }

    .footer-copy {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
    }

    .footer-links {
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .footer-links a {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer-links a:hover { color: rgba(255, 255, 255, 0.7); }

    .footer-sep {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 767px) {
      .site-footer { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">

    <img src="src/photo.webp" alt="" class="bg-video" />
    <div class="bg-overlay"></div>

    <div class="page-content">

      <nav class="navbar animate-fade-rise">
        <a href="index.html" class="navbar-brand">
          <img src="src/logo.webp" alt="Algoxy AI Logo" class="navbar-logo" />
          ALGOXY AI
        </a>
        <ul class="navbar-links">
          <li><a href="services.html">Services</a></li>
          <li><a href="case-studies.html">Case Studies</a></li>
          <li><a href="about.html">About Us</a></li>
        </ul>
        <a href="mailto:contact@algoxy.ai" class="liquid-glass navbar-cta" style="text-decoration:none;">Get in Touch</a>
      </nav>

      <div class="error-body">
        <p class="error-label animate-fade-rise">404</p>
        <h1 class="error-heading animate-fade-rise">Page not found</h1>
        <p class="error-sub animate-fade-rise-delay">
          This page doesn't exist or may have moved.
        </p>
        <a href="index.html" class="liquid-glass error-cta animate-fade-rise-delay-2" style="text-decoration:none;">
          Back to Home
        </a>
      </div>

      <nav class="mobile-nav-bottom">
        <a href="services.html">Services</a>
        <a href="case-studies.html">Case Studies</a>
        <a href="about.html">About Us</a>
      </nav>

      <footer class="site-footer">
        <span class="footer-copy">&copy; 2026 Algoxy AI</span>
        <nav class="footer-links">
          <a href="privacy.html">Privacy</a>
          <span class="footer-sep">&middot;</span>
          <a href="terms.html">Terms</a>
        </nav>
      </footer>

    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Case Studies - Algoxy AI</title>
  <link rel="icon" type="image/png" href="src/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: hsl(0, 0%, 0%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3 {
      font-family: 'Instrument Serif', serif;
    }

    /* ── Liquid Glass ─────────────────────────────────────────── */
    .liquid-glass {
      position: relative;
      background: rgba(255, 255, 255, 0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15);
      overflow: hidden;
      cursor: pointer;
      color: #fff;
      font-family: 'Inter', sans-serif;
      transition: scale 0.2s ease;
    }

    .liquid-glass:hover { scale: 1.03; }

    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.45) 0%,
        rgba(255, 255, 255, 0.15) 20%,
        rgba(255, 255, 255, 0)    40%,
        rgba(255, 255, 255, 0)    60%,
        rgba(255, 255, 255, 0.15) 80%,
        rgba(255, 255, 255, 0.45) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ── Animations ───────────────────────────────────────────── */
    @keyframes fade-rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-rise       { animation: fade-rise 0.8s ease-out 0.1s  both; }
    .animate-fade-rise-delay { animation: fade-rise 0.8s ease-out 0.35s both; }

    /* ── Page — full-screen, no scroll ───────────────────────── */
    .page {
      position: relative;
      height: 100vh;
      overflow: hidden;
      background: #000;
      display: flex;
      flex-direction: column;
    }

    /* ── Background image ─────────────────────────────────────── */
    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: blur(2px);
      transform: scale(1.04);
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 1;
    }

    /* ── Content above video ──────────────────────────────────── */
    .page-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    /* ── Navbar ───────────────────────────────────────────────── */
    .navbar {
      flex-shrink: 0;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      max-width: 80rem;
      width: 100%;
      margin: 0 auto;
    }

    .navbar-brand {
      font-family: 'Instrument Serif', serif;
      font-size: 1.875rem;
      letter-spacing: -0.025em;
      color: #fff;
      text-decoration: none;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .navbar-logo {
      height: 2rem;
      width: auto;
      display: block;
    }

    .navbar-links {
      display: none;
      flex-direction: row;
      gap: 2.5rem;
      list-style: none;
      flex: 1;
      justify-content: center;
    }

    .navbar-links a {
      font-size: 0.875rem;
      color: #fff;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .navbar-links a:hover  { opacity: 0.8; }
    .navbar-links a.active { opacity: 0.4; pointer-events: none; }

    .navbar-cta {
      border-radius: 9999px;
      padding: 0.625rem 1.5rem;
      font-size: 0.875rem;
    }

    @media (min-width: 768px) {
      .navbar-links { display: flex; }
    }

    /* ── Centered coming-soon content ────────────────────────── */
    .coming-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 2rem 4rem;
      gap: 1.5rem;
    }

    .coming-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
    }

    .coming-heading {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: #fff;
    }

    .coming-sub {
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.875rem, 1.5vw, 1rem);
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.7;
      max-width: 28rem;
    }

    /* ── Hamburger — hidden on desktop ───────────────────────── */
    .hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5.5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: #fff;
      border-radius: 2px;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── Mobile backdrop ─────────────────────────────────────── */
    .mobile-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .mobile-backdrop.open {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Slide-down panel menu — liquid glass ────────────────── */
    .mobile-menu {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(22px) saturate(1.8);
      -webkit-backdrop-filter: blur(22px) saturate(1.8);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15);
      overflow: hidden;
      padding: 5.5rem 2rem 2rem;
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.3s ease;
    }

    .mobile-menu::before {
      content: '';
      position: absolute;
      inset: 0;
      padding: 1.4px;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.3)  0%,
        rgba(255, 255, 255, 0.1)  20%,
        rgba(255, 255, 255, 0)    40%,
        rgba(255, 255, 255, 0)    60%,
        rgba(255, 255, 255, 0.1)  80%,
        rgba(255, 255, 255, 0.35) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .mobile-menu.open {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .mobile-menu-links {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .mobile-menu-links li {
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .mobile-menu-links li:last-child { border-bottom: none; }

    .mobile-menu-links a {
      font-family: 'Instrument Serif', serif;
      font-size: 1.75rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.02em;
      opacity: 0.85;
      display: block;
      padding: 0.85rem 0;
      transition: opacity 0.2s ease;
    }

    .mobile-menu-links a:hover  { opacity: 1; }
    .mobile-menu-links a.inactive { opacity: 0.3; cursor: default; pointer-events: none; }

    .navbar.menu-open { z-index: 300; }

    /* ── Mobile bottom nav ───────────────────────────────────── */
    .mobile-nav-bottom { display: none; }

    @media (max-width: 767px) {
      /* Grid layout: navbar / content / bottom-nav fill exactly 100vh */
      .page {
        display: grid;
        grid-template-rows: auto 1fr auto;
        height: 100vh;
        min-height: unset;
        overflow: hidden;
      }

      .page-content {
        display: contents; /* let navbar, coming-body, nav sit directly in grid */
      }

      .hamburger  { display: none; }
      .navbar-cta { display: none; }
      .navbar     { justify-content: center; }

      .mobile-nav-bottom {
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 1.5rem 2rem 2rem;
        position: relative;
        z-index: 10;
      }

      .mobile-nav-bottom a {
        font-family: 'Inter', sans-serif;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.75);
        text-decoration: underline;
        text-underline-offset: 5px;
        text-decoration-color: rgba(255, 255, 255, 0.35);
        transition: color 0.2s ease, text-decoration-color 0.2s ease;
      }

      .mobile-nav-bottom a:hover {
        color: #fff;
        text-decoration-color: rgba(255, 255, 255, 0.7);
      }

      .mobile-nav-bottom a.inactive { opacity: 0.3; pointer-events: none; }
    }

    @media (max-width: 640px) {
      .navbar        { padding: 1.25rem 1.25rem; }
      .navbar-brand  { font-size: 1.35rem; }
      .navbar-logo   { height: 1.5rem; }
      .coming-body   { padding: 1rem 1.25rem 2rem; }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Background image -->
    <img src="src/photo.png" alt="" class="bg-video" />
    <div class="bg-overlay"></div>

    <div class="page-content">

      <!-- Navbar -->
      <nav class="navbar animate-fade-rise">
        <button class="hamburger" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
        <a href="index.html" class="navbar-brand">
          <img src="src/logo.png" alt="Algoxy AI Logo" class="navbar-logo" />
          ALGOXY AI
        </a>
        <ul class="navbar-links">
          <li><a href="services.html">Services</a></li>
          <li><a href="case-studies.html" class="active">Case Studies</a></li>
          <li><a href="about.html">About Us</a></li>
        </ul>
        <a href="mailto:contact@algoxy.ai" class="liquid-glass navbar-cta" style="text-decoration:none;">Get in Touch</a>
      </nav>

      <!-- Coming soon content -->
      <div class="coming-body">
        <p class="coming-label animate-fade-rise">What we've built</p>
        <h1 class="coming-heading animate-fade-rise">Coming Soon</h1>
        <p class="coming-sub animate-fade-rise-delay">
          We're documenting our work.<br />Case studies dropping soon.
        </p>
      </div>

      <!-- Mobile bottom nav -->
      <nav class="mobile-nav-bottom">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html">About Us</a>
      </nav>

    </div>
  </div>

  <!-- Mobile backdrop -->
  <div class="mobile-backdrop" id="mobileBackdrop"></div>

  <!-- Mobile slide-down panel -->
  <div class="mobile-menu" id="mobileMenu">
    <ul class="mobile-menu-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="case-studies.html" class="inactive">Case Studies</a></li>
      <li><a href="about.html">About Us</a></li>
    </ul>
  </div>

  <script>
    const hamburger = document.querySelector('.hamburger');
    const navbar    = document.querySelector('.navbar');
    const menu      = document.getElementById('mobileMenu');
    const backdrop  = document.getElementById('mobileBackdrop');

    function closeMenu() {
      hamburger.classList.remove('open');
      navbar.classList.remove('menu-open');
      menu.classList.remove('open');
      backdrop.classList.remove('open');
    }

    hamburger.addEventListener('click', () => {
      const isOpen = menu.classList.contains('open');
      if (isOpen) { closeMenu(); }
      else {
        hamburger.classList.add('open');
        navbar.classList.add('menu-open');
        menu.classList.add('open');
        backdrop.classList.add('open');
      }
    });

    backdrop.addEventListener('click', closeMenu);
    menu.querySelectorAll('a:not(.inactive)').forEach(a => {
      a.addEventListener('click', closeMenu);
    });
  </script>
</body>
</html>
